<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f3f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:350px;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
text-align:center;
}

h2{
margin-bottom:20px;
color:#222;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:10px;
color:white;
}

.generate{
background:#007bff;
}

.pay{
background:#28a745;
display:none;
}

#qrcode{
margin-top:20px;
display:flex;
justify-content:center;
}

#timer{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:red;
}

</style>
</head>
<body>

<div class="container">

<h2>UPI Payment</h2>

<input type="text" id="upi" placeholder="Enter UPI ID">

<input type="number" id="amount" placeholder="Enter Amount">

<button class="generate" onclick="generateQR()">
Generate QR
</button>

<div id="qrcode"></div>

<div id="timer"></div>

<button class="pay" id="payBtn" onclick="payNow()">
PAY NOW
</button>

</div>

<script>

let upiLink = "";
let timeLeft = 120;
let timer;

function generateQR(){

let upi = document.getElementById("upi").value;
let amount = document.getElementById("amount").value;

if(upi === "" || amount === ""){
alert("Enter UPI ID and Amount");
return;
}

upiLink = `upi://pay?pa=${upi}&pn=Merchant&am=${amount}&cu=INR`;

document.getElementById("qrcode").innerHTML = "";

new QRCode(document.getElementById("qrcode"),{
text: upiLink,
width:220,
height:220
});

document.getElementById("payBtn").style.display = "block";

startTimer();

}

function payNow(){

window.location.href = upiLink;

}

function startTimer(){

clearInterval(timer);

timeLeft = 120;

timer = setInterval(()=>{

let min = Math.floor(timeLeft / 60);
let sec = timeLeft % 60;

if(sec < 10){
sec = "0" + sec;
}

document.getElementById("timer").innerHTML =
`Timer : ${min}:${sec}`;

timeLeft--;

if(timeLeft < 0){

clearInterval(timer);

document.getElementById("timer").innerHTML =
"QR Expired";

document.getElementById("qrcode").innerHTML = "";

document.getElementById("payBtn").style.display = "none";

}

},1000);

}

</script>

</body>
</html>
